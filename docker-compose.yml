services:
  backend:
    container_name: stratego-backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - PORT=8080
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-stratego}
      - DB_SSLMODE=disable
    depends_on:
      stratego:
        condition: service_healthy

  frontend:
    container_name: stratego-frontend
    environment:
      - VITE_API_BASE=${VITE_API_BASE}
      - VITE_WS_BASE=${VITE_WS_BASE}
    depends_on:
      - backend

  stratego:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-stratego}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - stratego-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  stratego-pg-data:
