services:
  backend:
    build:
      context: ./code/backend
      dockerfile: Dockerfile.dev
    container_name: stratego-backend-dev
    volumes:
      - ./code/backend:/src:rw
      - go-mod-cache:/go/pkg/mod
    # In dev, we map to 8080 internally as per Dockerfile.dev
    ports:
      - "${BACKEND_PORT}:8080"
    command: ./entrypoint.dev.sh

  frontend:
    image: oven/bun:1-alpine
    container_name: stratego-frontend-dev
    working_dir: /app
    volumes:
      - ./code/frontend:/app:rw
      - /app/node_modules
    # In dev, Vite usually listens on 5173
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      - VITE_API_BASE=${VITE_API_BASE}
      - VITE_WS_BASE=${VITE_WS_BASE}
    command: >
      sh -lc "bun install && bun run dev -- --host 0.0.0.0"

volumes:
  go-mod-cache:
