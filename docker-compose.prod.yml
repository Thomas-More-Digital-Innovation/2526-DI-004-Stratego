services:
  backend:
    build:
      context: ./code/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./code/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE}
        VITE_WS_BASE: ${VITE_WS_BASE}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  stratego:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
