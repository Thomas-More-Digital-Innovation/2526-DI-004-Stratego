services:
  backend:
    image: ghcr.io/${REPO_LOWER}/backend:latest
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - PORT=8080
      - APP_ENV=${APP_ENV}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/${REPO_LOWER}/frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  stratego:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - stratego-pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"

volumes:
  stratego-pg-data:
