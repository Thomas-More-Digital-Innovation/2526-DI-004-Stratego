name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: prep
        run: echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./code/backend
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.repo_lower }}/backend:${{ github.ref_name }},ghcr.io/${{ steps.prep.outputs.repo_lower }}/backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./code/frontend
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.repo_lower }}/frontend:${{ github.ref_name }},ghcr.io/${{ steps.prep.outputs.repo_lower }}/frontend:latest
          build-args: |
            VITE_API_BASE=${{ vars.VITE_API_BASE }}
            VITE_WS_BASE=${{ vars.VITE_WS_BASE }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker-compose.prod.yml,code/backend/schema.sql"
          target: ${{ vars.DEPLOY_PATH }}

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            mkdir -p ${{ vars.DEPLOY_PATH }}
            cd ${{ vars.DEPLOY_PATH }}
            echo "APP_ENV=${{ vars.APP_ENV }}" > .env
            echo "ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" >> .env
            echo "REPO_LOWER=${{ steps.prep.outputs.repo_lower }}" >> .env
            echo "BACKEND_PORT=${{ vars.BACKEND_PORT }}" >> .env
            echo "FRONTEND_PORT=${{ vars.FRONTEND_PORT }}" >> .env
            echo "VITE_API_BASE=${{ vars.VITE_API_BASE }}" >> .env
            echo "VITE_WS_BASE=${{ vars.VITE_WS_BASE }}" >> .env
            echo "DB_USER=${{ vars.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ vars.DB_NAME }}" >> .env
            echo "DB_HOST=${{ vars.DB_HOST }}" >> .env
            echo "DB_PORT=${{ vars.DB_PORT }}" >> .env
            # Pull and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # Apply database schema
            docker compose -f docker-compose.prod.yml exec -T stratego psql -U ${{ vars.DB_USER }} -d ${{ vars.DB_NAME }} < code/backend/schema.sql
